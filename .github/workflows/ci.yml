name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract tests
        run: cargo test --workspace

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM release
        run: stellar contract build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --passWithNoTests --ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          NEXT_PUBLIC_TOKEN_CONTRACT_ID: CDEERRPRAJ4SQEJ47D2KT4W4QO37KLTXP24YIDGH3L2MOAVDDXO334T2
          NEXT_PUBLIC_REGISTRY_CONTRACT_ID: CA4ZWH7SRLLY42DCE7DMPMW6BAVJXAJ5E7Q63BZLMIEKVIECIDJSXBI7
          NEXT_PUBLIC_BOT_NFT_CONTRACT_ID: CD7BXYZIZZ6AHB6KEXTCBPCAPOETY3HELVZYDAZX5S6OVWEFUE43CI6E
          NEXT_PUBLIC_ACCRUAL_CONTRACT_ID: CDFUBWJW5QFHNUFGSR4LCDCVNYR3PBF4J4YWEZC56G24ERQGVYBA5BWS
          NEXT_PUBLIC_MARKETPLACE_CONTRACT_ID: CCYTOPEAH322S2XVWWOODYMFUXLHJP4YKLEZ4RXGHDVZNM2BUBBHIRCM

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [contracts, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: --prod
